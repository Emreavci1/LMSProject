<div class="page page-narrow">
  <div class="page-banner">
    <div>
      <h1>Profil</h1>
      <p class="subtitle">Hesap bilgilerini görüntüle ve düzenle.</p>
    </div>
  </div>

  <div class="profile-card">
    <!-- Sol: avatar + özet -->
    <div class="avatar-side">
      <img class="big-avatar" [src]="avatarSrc(auth.currentUser()?.avatarUrl)" alt="Profil fotoğrafı" />
      <strong>{{ auth.currentUser()?.fullName }}</strong>
      <span class="muted">{{ auth.currentUser()?.email }}</span>
      <span class="role-badge">{{ auth.role() }}</span>

      <!-- Fotoğraf yükle -->
      <button
        mat-stroked-button
        class="avatar-upload-btn"
        (click)="avatarInput.click()"
        [disabled]="uploadingAvatar()"
      >
        <mat-icon>photo_camera</mat-icon>
        {{ uploadingAvatar() ? 'Yükleniyor...' : 'Fotoğraf Yükle' }}
      </button>
      <input #avatarInput type="file" accept="image/*" (change)="onAvatarSelected($event)" style="display: none" />

      <!-- Hazır avatarlar (foto istemeyenler için) -->
      <p class="preset-label">veya hazır avatar seç:</p>
      <div class="preset-row">
        @for (preset of presets; track preset.id) {
          <button
            type="button"
            class="preset-btn"
            [class.selected]="auth.currentUser()?.avatarUrl === preset.id"
            (click)="selectPreset(preset.id)"
            [title]="preset.label"
          >
            <img [src]="avatarSrc(preset.id)" [alt]="preset.label" />
          </button>
        }
      </div>
    </div>

    <!-- Sağ: düzenleme formu -->
    <form [formGroup]="form" (ngSubmit)="save()" class="form-side">
      <mat-form-field appearance="outline">
        <mat-label>Ad Soyad</mat-label>
        <input matInput formControlName="fullName" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Telefon (opsiyonel)</mat-label>
        <input matInput formControlName="phone" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Hakkımda (opsiyonel)</mat-label>
        <textarea matInput formControlName="bio" rows="3"></textarea>
      </mat-form-field>

      <button mat-flat-button color="primary" type="submit">
        <mat-icon>save</mat-icon> Kaydet
      </button>
    </form>
  </div>
</div>
