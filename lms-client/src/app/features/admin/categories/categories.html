<div class="page">
  <div class="page-header">
    <div>
      <h1>Kategori Yönetimi</h1>
      <p class="subtitle">Eğitim kategorilerini düzenleyin.</p>
    </div>
  </div>

  <!-- Yeni kategori ekleme -->
  <div class="add-section">
    <div class="add-input-wrap">
      <mat-icon class="input-icon">category</mat-icon>
      <input
        type="text"
        placeholder="Yeni kategori adı..."
        [ngModel]="newCategoryName()"
        (ngModelChange)="newCategoryName.set($event)"
        (keydown.enter)="addCategory()"
      />
    </div>
    <button mat-flat-button color="primary" (click)="addCategory()">
      <mat-icon>add</mat-icon>
      Ekle
    </button>
  </div>

  <!-- Kategori listesi -->
  <div class="category-list">
    @for (cat of mock.categories(); track cat) {
      <div class="category-item">
        <div class="category-info">
          <div class="category-icon-wrap">
            <mat-icon>folder</mat-icon>
          </div>
          <div>
            <p class="category-name">{{ cat }}</p>
            <p class="category-count">{{ courseCount(cat) }} eğitim</p>
          </div>
        </div>
        <button class="remove-btn" (click)="removeCategory(cat)">
          <mat-icon>delete_outline</mat-icon>
        </button>
      </div>
    }
  </div>

  @if (mock.categories().length === 0) {
    <div class="empty">
      <mat-icon>category</mat-icon>
      <p>Henüz kategori eklenmemiş.</p>
    </div>
  }
</div>
